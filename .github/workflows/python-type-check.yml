name: Python Type-Check

# mallana fork: type-check only the fork's own app code (track1 — the agent/router, stdlib-only,
# no heavy deps). The mixed research scripts under scripts/ are intentionally untyped, so they are
# not type-checked here. Triggers only when the app code (or ty config) changes.
on:
  push:
    paths:
      - '.github/workflows/python-type-check.yml'
      - 'ty.toml'
      - 'track1/**.py'
  pull_request:
    paths:
      - '.github/workflows/python-type-check.yml'
      - 'ty.toml'
      - 'track1/**.py'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  python-type-check:
    runs-on: ubuntu-slim
    name: python type-check
    steps:
      - name: Check out source repository
        uses: actions/checkout@v6
      - name: Set up Python environment
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          pip-install: ty==0.0.24
      - name: Type-check with ty
        run: |
            # Fork app code is stdlib-only; no requirements install needed.
            ty check --output-format=github track1
